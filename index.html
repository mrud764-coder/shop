<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test Marketplace</title>
    <!-- Официальный SDK Telegram -->
    <script src="https://telegram.org"></script>
    <style>
        body { 
            background-color: #0d0e12; color: #f3f4f6; 
            font-family: sans-serif; text-align: center; padding: 50px 20px;
            -webkit-user-select: none; user-select: none;
        }
        .btn-test { 
            background: #6366f1; color: white; border: none; 
            font-size: 16px; font-weight: bold; padding: 15px 30px; 
            border-radius: 14px; cursor: pointer; margin: 10px; width: 80%;
        }
        .btn-test:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <h2>CYBER NEXUS TEST</h2>
    <p>Если вы видите этот текст, значит сайт на Vercel успешно обновился!</p>

    <!-- КНОПКА 1: Проверка работы самого JavaScript -->
    <button class="btn-test" onclick="testClick()">1. Тест клика (Alert)</button>

    <!-- КНОПКА 2: Проверка связи с вашим ботом -->
    <button class="btn-test" onclick="testLink()" style="background: #10b981;">2. Тест перехода в бот</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function testClick() {
            tg.showAlert("Ура! JavaScript внутри Telegram работает идеально!");
        }

        function testLink() {
            try {
                const botUsername = "my_premium_shop_2026_bot";
                
                // ИСПРАВЛЕНО: Убрали длинные строки и спецсимволы. Передаем супер-компактный код "p299" (Premium, 299р)
                const deepLink = `https://t.me{botUsername}?start=p299`;
                
                // Нативно открываем чат с ботом
                tg.openTelegramLink(deepLink);
                tg.close();
            } catch (e) {
                alert("Ошибка перехода: " + e.message);
            }
        }
    </script>
</body>
</html>
