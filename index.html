<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enterprise Marketplace</title>
    <!-- Официальный SDK Telegram Mini Apps -->
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #161820;
            --accent: #6366f1;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --success: #10b981;
        }

        body { 
            background-color: var(--bg-color); color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            padding: 16px 16px 100px 16px; margin: 0;
            -webkit-user-select: none; user-select: none;
        }

        .brand { font-size: 20px; font-weight: 800; color: var(--accent); text-align: center; margin-bottom: 20px; }
        .app-screen { display: none; }
        .app-screen.active { display: block; }

        .vip-card { background: #1e1b4b; padding: 20px; border-radius: 24px; border: 1px solid rgba(99, 102, 241, 0.25); margin-bottom: 24px; }
        .bonus-value { font-size: 28px; font-weight: 900; color: #facc15; margin-top: 8px; }

        .grid { display: flex; flex-direction: column; gap: 14px; }
        .premium-card { 
            background: var(--card-bg); padding: 18px; border-radius: 24px; 
            display: flex; justify-content: space-between; align-items: center; 
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .item-title { font-size: 15px; font-weight: 700; margin: 0; }
        .price-tag { color: #ffffff; font-weight: 800; font-size: 16px; display: block; margin-top: 6px; }
        
        .btn-buy { background: var(--accent); color: white; border: none; font-size: 12px; font-weight: 700; padding: 10px 20px; border-radius: 14px; cursor: pointer; }
        .btn-buy:active { transform: scale(0.95); }

        .bottom-sheet-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; }
        .bottom-sheet { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: #131520; border-radius: 30px 30px 0 0; padding: 24px 20px 40px 20px; box-sizing: border-box; z-index: 1001; }
        .pay-option { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 16px; border-radius: 18px; margin-bottom: 10px; display: flex; align-items: center; gap: 14px; cursor: pointer; }

        .bottom-nav {
            position: fixed; bottom: 16px; left: 16px; right: 16px;
            background: #11131c; border-radius: 24px; padding: 12px; 
            display: flex; justify-content: space-around; border: 1px solid rgba(255, 255, 255, 0.05); z-index: 999;
        }
        .nav-btn { background: none; border: none; color: var(--text-muted); font-size: 13px; font-weight: 700; cursor: pointer; }
        .nav-btn.active { color: var(--accent); }
    </style>
</head>
<body>

    <div class="brand">CYBER NEXUS</div>

    <!-- ЭКРАН 1: МАГАЗИН -->
    <div class="app-screen active" id="screen-shop">
        <div class="grid">
            <div class="premium-card">
                <div>
                    <h3 class="item-title">Telegram Premium (1 мес)</h3>
                    <span class="price-tag">299 ₽</span>
                </div>
                <button class="btn-buy" onclick="openPayment('Telegram Premium', 299)">Купить</button>
            </div>
            <div class="premium-card">
                <div>
                    <h3 class="item-title">Скоростной VPN (1 год)</h3>
                    <span class="price-tag">590 ₽</span>
                </div>
                <button class="btn-buy" onclick="openPayment('Скоростной VPN', 590)">Купить</button>
            </div>
        </div>
    </div>

    <!-- ЭКРАН 2: ПРОФИЛЬ -->
    <div class="app-screen" id="screen-profile">
        <div class="vip-card">
            <h2 style="margin:0; font-size:18px;" id="user-display">Премиум Клиент</h2>
            <div class="bonus-value">100 ₽</div>
            <p style="font-size:11px; color:var(--text-muted); margin:8px 0 0 0;">Ваш бонусный баланс в CRM</p>
        </div>
    </div>

    <!-- ЭКРАН 3: АДМИНКА -->
    <div class="app-screen" id="screen-admin">
        <div class="vip-card" style="background: #064e3b; border-color: #047857;">
            <h3 style="margin:0; font-size:14px; color:#a7f3d0;">ВЫРУЧКА СЕГОДНЯ</h3>
            <div class="bonus-value" style="color:#10b981;">24 390 ₽</div>
        </div>
    </div>

    <!-- Навигация -->
    <div class="bottom-nav">
        <button class="nav-btn active" id="btn-shop" onclick="changeScreen('shop')">🛍️ Магазин</button>
        <button class="nav-btn" id="btn-profile" onclick="changeScreen('profile')">👤 Профиль</button>
        <button class="nav-btn" id="btn-admin" onclick="changeScreen('admin')">📊 Админка</button>
    </div>

    <!-- Выезжающее окно способов оплаты -->
    <div class="bottom-sheet-overlay" id="sheet-overlay" onclick="closePaymentSheet()"></div>
    <div class="bottom-sheet" id="payment-sheet">
        <h3 style="font-size: 16px; text-align: center; margin-bottom: 20px;">Выберите способ оплаты</h3>
        <div class="pay-option" onclick="selectPayment('Тестовая карта')">💳 Тестовая карта (Stars)</div>
        <div class="pay-option" onclick="selectPayment('СБП')">📲 Моментальный баланс</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('user-display').innerText = tg.initDataUnsafe.user.first_name;
        }
        
        let currentOrder = { name: "", price: "" };

        function changeScreen(screenId) {
            document.getElementById('screen-shop').classList.remove('active');
            document.getElementById('screen-profile').classList.remove('active');
            document.getElementById('screen-admin').classList.remove('active');
            document.getElementById('btn-shop').classList.remove('active');
            document.getElementById('btn-profile').classList.remove('active');
            document.getElementById('btn-admin').classList.remove('active');
            
            document.getElementById('screen-' + screenId).classList.add('active');
            document.getElementById('btn-' + screenId).classList.add('active');
        }

        function openPayment(name, price) {
            currentOrder.name = name;
            currentOrder.price = price;
            document.getElementById('sheet-overlay').style.display = 'block';
            document.getElementById('payment-sheet').style.display = 'block';
        }

        function closePaymentSheet() {
            document.getElementById('payment-sheet').style.display = 'none';
            document.getElementById('sheet-overlay').style.display = 'none';
        }

        function selectPayment(method) {
            try {
                closePaymentSheet();
                
                // Кодируем заказ в безопасный формат: TG_299 или VPN_590
                let itemCode = "TG";
                if (String(currentOrder.name).includes("VPN")) {
                    itemCode = "VPN";
                }
                
                const payload = `${itemCode}_${currentOrder.price}`;
                const botUsername = "my_premium_shop_2026_bot"; 
                
                // ИСПРАВЛЕНО: Теперь символы $ и / стоят на своих местах, JS отработает корректно
                const deepLink = `https://t.me{botUsername}?start=${payload}`;
                
                tg.openTelegramLink(deepLink);
                tg.close();
            } catch (error) {
                alert("Ошибка JS: " + error.message);
            }
        }
    </script>
</body>
</html>
