<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Digital Shop</title>
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #161820;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --success: #10b981;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            padding: 16px;
            margin: 0;
            user-select: none;
        }

        /* Профиль пользователя вверху */
        .user-profile {
            background: linear-gradient(135deg, #1e1b4b 0%, #111827 100%);
            padding: 16px;
            border-radius: 20px;
            margin-bottom: 24px;
            border: 1px solid #312e81;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-avatar {
            width: 42px;
            height: 42px;
            background: var(--accent-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }
        .user-welcome { font-size: 14px; font-weight: 600; margin: 0; }
        .user-status { font-size: 11px; color: var(--success); margin: 2px 0 0 0; display: flex; align-items: center; gap: 4px; }
        .status-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; display: inline-block; }

        /* Заголовок категорий */
        .category-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 14px;
            font-weight: 700;
            padding-left: 4px;
        }

        /* Сетка товаров */
        .grid { display: flex; flex-direction: column; gap: 14px; margin-bottom: 120px; }
        
        /* Карточка премиум товара */
        .card { 
            background-color: var(--card-bg); 
            padding: 18px; 
            border-radius: 22px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid #232736; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s, border-color 0.2s;
        }
        .card:active { transform: scale(0.99); border-color: var(--accent-color); }
        
        .item-info { display: flex; align-items: center; gap: 14px; }
        .item-icon {
            font-size: 26px;
            background: #1f2231;
            width: 52px;
            height: 52px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #2e3349;
        }
        
        .title { font-size: 15px; font-weight: 600; margin: 0; letter-spacing: -0.2px; }
        .badge { background: rgba(16, 185, 129, 0.1); color: var(--success); font-size: 10px; padding: 2px 6px; border-radius: 6px; font-weight: 600; display: inline-block; margin-top: 4px; }
        .price { color: #ffffff; font-weight: 800; font-size: 16px; display: block; margin-top: 6px; }
        
        /* Кнопка купить */
        .btn { 
            background: linear-gradient(135deg, var(--accent-color) 0%, #4f46e5 100%);
            color: white; 
            border: none; 
            font-size: 13px; 
            font-weight: 600; 
            padding: 10px 20px; 
            border-radius: 14px; 
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
            transition: all 0.1s ease;
        }
        .btn:active { transform: scale(0.93); box-shadow: none; }
    </style>
</head>
<body>

    <!-- Блок профиля клиента -->
    <div class="user-profile">
        <div class="user-avatar">👤</div>
        <div>
            <h2 class="user-welcome" id="username">Премиум Клиент</h2>
            <p class="user-status"><span class="status-dot"></span> Дисконтная программа активна</p>
        </div>
    </div>

    <h2 class="category-title">🔥 Популярные товары</h2>

    <div class="grid">
        <!-- Товар 1 -->
        <div class="card">
            <div class="item-info">
                <div class="item-icon">⭐</div>
                <div>
                    <h3 class="title">Telegram Premium (1 месяц)</h3>
                    <span class="badge">⚡ В наличии</span>
                    <span class="price">299 ₽</span>
                </div>
            </div>
            <button onclick="addToCart('Telegram Premium 1 мес', 299)" class="btn">Купить</button>
        </div>

        <!-- Товар 2 -->
        <div class="card">
            <div class="item-info">
                <div class="item-icon">🛡️</div>
                <div>
                    <h3 class="title">Высокоскоростной VPN (1 год)</h3>
                    <span class="badge">⚡ В наличии</span>
                    <span class="price">590 ₽</span>
                </div>
            </div>
            <button onclick="addToCart('Скоростной VPN 1 год', 590)" class="btn">Купить</button>
        </div>
        
        <!-- Товар 3 (Для веса и красоты) -->
        <div class="card">
            <div class="item-info">
                <div class="item-icon">🤖</div>
                <div>
                    <h3 class="title">ChatGPT Plus (Аккаунт)</h3>
                    <span class="badge">⚡ В наличии</span>
                    <span class="price">1 490 ₽</span>
                </div>
            </div>
            <button onclick="addToCart('ChatGPT Plus Аккаунт', 1490)" class="btn">Купить</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // Автоматически подставляем имя пользователя из Telegram в шапку витрины
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('username').innerText = tg.initDataUnsafe.user.first_name;
        }
        
        let cart = { items: [], total_price: 0 };
        const mainButton = tg.MainButton;
        
        mainButton.setText("Оформить заказ (0 ₽)");
        mainButton.textColor = "#FFFFFF";
        mainButton.color = "#6366f1"; // Индиго под цвет дизайна

        function addToCart(name, price) {
            cart.items.push(name);
            cart.total_price += price;
            mainButton.setText(`Оформить заказ (${cart.total_price} ₽)`);
            if (!mainButton.isVisible) mainButton.show();
        }

        mainButton.onClick(function() {
            tg.sendData(JSON.stringify(cart));
        });
    </script>
</body>
</html>
