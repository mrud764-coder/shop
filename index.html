<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ Cyber Digital Marketplace</title>
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #161820;
            --accent: #6366f1;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --success: #10b981;
        }

        body { 
            background-color: var(--bg-color);
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            padding: 20px 16px 140px 16px;
            margin: 0;
        }

        /* VIP Профиль */
        .premium-profile {
            background: #1e1b4b;
            padding: 20px; border-radius: 24px; margin-bottom: 24px;
            border: 1px solid rgba(99, 102, 241, 0.25);
            display: flex; align-items: center; justify-content: space-between;
        }
        .profile-meta { display: flex; align-items: center; gap: 14px; }
        .avatar-glow {
            width: 46px; height: 46px; background: #6366f1;
            border-radius: 16px; display: flex; align-items: center; justify-content: center;
            font-size: 22px;
        }
        .welcome-text { font-size: 16px; font-weight: 700; margin: 0; }
        .status-badge { font-size: 11px; color: var(--success); margin-top: 4px; display: flex; align-items: center; gap: 5px; font-weight: 600; }
        .pulse-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; }
        .balance-pill { background: rgba(255, 255, 255, 0.05); padding: 6px 12px; border-radius: 12px; }
        .balance-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; }
        .balance-value { font-size: 13px; font-weight: 700; color: #facc15; margin-top: 2px; }

        /* Табы */
        .tabs-container { display: flex; gap: 8px; margin-bottom: 24px; }
        .tab-item {
            background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 10px 18px; border-radius: 14px; font-size: 13px; font-weight: 600;
            color: var(--text-muted); cursor: pointer;
            z-index: 10;
        }
        .tab-item.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* Карточки товаров */
        .cards-feed { display: flex; flex-direction: column; gap: 14px; }
        .premium-card { 
            background: var(--card-bg);
            padding: 18px; border-radius: 24px; display: flex; justify-content: space-between;
            align-items: center; border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .premium-card.hidden { display: none; }
        .meta-layer { display: flex; align-items: center; gap: 14px; }
        .neon-icon { font-size: 24px; background: #141622; width: 48px; height: 48px; border-radius: 16px; display: flex; align-items: center; justify-content: center; }
        .item-title { font-size: 15px; font-weight: 700; margin: 0; }
        .stock-tag { color: var(--success); font-size: 11px; font-weight: 600; margin-top: 4px; display: flex; align-items: center; gap: 4px; }
        .tag-dot { width: 4px; height: 4px; background: var(--success); border-radius: 50%; }
        .price-tag { color: #ffffff; font-weight: 800; font-size: 16px; display: block; margin-top: 6px; }

        /* Кнопки и Счётчики */
        .control-wrapper { position: relative; z-index: 20; }
        .btn-buy { background: #6366f1; color: white; border: none; font-size: 12px; font-weight: 700; padding: 10px 20px; border-radius: 14px; cursor: pointer; }
        
        .counter-container { display: none; align-items: center; background: rgba(255,255,255,0.05); border-radius: 14px; padding: 4px; gap: 12px; }
        .btn-count { width: 32px; height: 32px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .count-value { font-size: 14px; font-weight: 700; min-width: 14px; text-align: center; }

        /* Окно Bottom Sheet */
        .bottom-sheet-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; }
        .bottom-sheet { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: #131520; border-radius: 30px 30px 0 0; border-top: 1px solid rgba(255,255,255,0.1); padding: 24px 20px 40px 20px; box-sizing: border-box; z-index: 1000; }
        .sheet-bar { width: 40px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 0 auto 20px auto; }
        .sheet-title { font-size: 18px; font-weight: 800; margin-bottom: 16px; text-align: center; }
        
        .pay-option { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 16px; border-radius: 18px; margin-bottom: 10px; display: flex; align-items: center; gap: 14px; cursor: pointer; }
        .pay-icon { font-size: 22px; }
        .pay-text { font-size: 14px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="premium-profile">
        <div class="profile-meta">
            <div class="avatar-glow">👑</div>
            <div>
                <h2 class="welcome-text" id="user-display">Премиум Клиент</h2>
                <p class="status-badge"><span class="pulse-dot"></span> VIP статус активен</p>
            </div>
        </div>
        <div class="balance-pill">
            <div class="balance-label">Кэшбэк</div>
            <div class="balance-value">7%</div>
        </div>
    </div>

    <div class="tabs-container">
        <div class="tab-item active" onclick="switchTab('all', this)">🔥 Все</div>
        <div class="tab-item" onclick="switchTab('vpn', this)">🛡️ VPN</div>
        <div class="tab-item" onclick="switchTab('ai', this)">🤖 ИИ</div>
    </div>

    <div class="cards-feed">
        <div class="premium-card" data-category="vpn">
            <div class="meta-layer">
                <div class="neon-icon">⭐</div>
                <div>
                    <h3 class="item-title">Telegram Premium (1 мес)</h3>
                    <span class="stock-tag"><span class="tag-dot"></span> Автовыдача</span>
                    <span class="price-tag">299 ₽</span>
                </div>
            </div>
            <div class="control-wrapper">
                <button class="btn-buy" id="buy-tg" onclick="activateCounter('tg', 'Telegram Premium 1 мес', 299)">Купить</button>
                <div class="counter-container" id="count-tg">
                    <button class="btn-count" onclick="updateCount('tg', -1, 'Telegram Premium 1 мес', 299)">-</button>
                    <span class="count-value" id="val-tg">1</span>
                    <button class="btn-count" onclick="updateCount('tg', 1, 'Telegram Premium 1 мес', 299)">+</button>
                </div>
            </div>
        </div>

        <div class="premium-card" data-category="vpn">
            <div class="meta-layer">
                <div class="neon-icon">⚡</div>
                <div>
                    <h3 class="item-title">Скоростной VPN (1 год)</h3>
                    <span class="stock-tag"><span class="tag-dot"></span> Автовыдача</span>
                    <span class="price-tag">590 ₽</span>
                </div>
            </div>
            <div class="control-wrapper">
                <button class="btn-buy" id="buy-vpn" onclick="activateCounter('vpn', 'Скоростной VPN 1 год', 590)">Купить</button>
                <div class="counter-container" id="count-vpn">
                    <button class="btn-count" onclick="updateCount('vpn', -1, 'Скоростной VPN 1 год', 590)">-</button>
                    <span class="count-value" id="val-vpn">1</span>
                    <button class="btn-count" onclick="updateCount('vpn', 1, 'Скоростной VPN 1 год', 590)">+</button>
                </div>
            </div>
        </div>
        
        <div class="premium-card" data-category="ai">
            <div class="meta-layer">
                <div class="neon-icon">🧠</div>
                <div>
                    <h3 class="item-title">ChatGPT Plus (Аккаунт)</h3>
                    <span class="stock-tag"><span class="tag-dot"></span> Автовыдача</span>
                    <span class="price-tag">1 490 ₽</span>
                </div>
            </div>
            <div class="control-wrapper">
                <button class="btn-buy" id="buy-ai" onclick="activateCounter('ai', 'ChatGPT Plus Аккаунт', 1490)">Купить</button>
                <div class="counter-container" id="count-ai">
                    <button class="btn-count" onclick="updateCount('ai', -1, 'ChatGPT Plus Аккаунт', 1490)">-</button>
                    <span class="count-value" id="val-ai">1</span>
                    <button class="btn-count" onclick="updateCount('ai', 1, 'ChatGPT Plus Аккаунт', 1490)">+</button>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-sheet-overlay" id="sheet-overlay" onclick="closePaymentSheet()"></div>
    <div class="bottom-sheet" id="payment-sheet">
        <div class="sheet-bar"></div>
        <h3 class="sheet-title">Выберите способ оплаты</h3>
        <div class="pay-option" onclick="selectPayment('Банковская карта')">
            <span class="pay-icon">💳</span>
            <span class="pay-text">Банковская карта (РФ / Мир)</span>
        </div>
        <div class="pay-option" onclick="selectPayment('Система быстрых платежей')">
            <span class="pay-icon">📲</span>
            <span class="pay-text">СБП (По QR-коду)</span>
        </div>
        <div class="pay-option" onclick="selectPayment('Криптовалюта')">
            <span class="pay-icon">🪙</span>
