<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Shop</title>
    <script src="https://telegram.org"></script>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        body { background-color: #131415; color: #ffffff; font-family: system-ui, sans-serif; }
    </style>
</head>
<body class="p-4 antialiased">
    <div class="text-center mb-6">
        <h1 class="text-2xl font-bold text-indigo-400">✨ Твой Цифровой Магазин</h1>
        <p class="text-xs text-gray-400 mt-1">Моментальная выдача после оплаты</p>
    </div>
    <div class="grid grid-cols-1 gap-4 mb-24">
        <div class="bg-gray-800 p-4 rounded-2xl flex justify-between items-center border border-gray-700">
            <div>
                <h3 class="font-semibold text-sm">Telegram Premium (1 месяц)</h3>
                <span class="text-indigo-400 font-bold text-sm block mt-2">299 ₽</span>
            </div>
            <button onclick="addToCart('Telegram Premium 1 мес', 299)" class="bg-indigo-600 text-xs font-medium py-2 px-4 rounded-xl text-white active:scale-95 transition-transform">В корзину</button>
        </div>
        <div class="bg-gray-800 p-4 rounded-2xl flex justify-between items-center border border-gray-700">
            <div>
                <h3 class="font-semibold text-sm">Высокоскоростной VPN (1 год)</h3>
                <span class="text-indigo-400 font-bold text-sm block mt-2">590 ₽</span>
            </div>
            <button onclick="addToCart('Скоростной VPN 1 год', 590)" class="bg-indigo-600 text-xs font-medium py-2 px-4 rounded-xl text-white active:scale-95 transition-transform">В корзину</button>
        </div>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let cart = { items: [], total_price: 0 };
        const mainButton = tg.MainButton;
        mainButton.setText("Оформить заказ (0 ₽)");
        mainButton.textColor = "#FFFFFF";
        mainButton.color = "#4f46e5";
        function addToCart(name, price) {
            cart.items.push(name);
            cart.total_price += price;
            mainButton.setText(`Оформить заказ (${cart.total_price} ₽)`);
            if (!mainButton.isVisible) mainButton.show();
        }
        mainButton.onClick(function() { tg.sendData(JSON.stringify(cart)); });
    </script>
</body>
</html>
