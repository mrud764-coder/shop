<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Digital Shop</title>
    <style>
        body { 
            background-color: #0d0e12; 
            color: #f3f4f6; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            padding: 20px 16px;
            margin: 0;
        }
        .premium-profile {
            background: #1e1b4b;
            padding: 20px; border-radius: 24px; margin-bottom: 24px;
            border: 1px solid rgba(99, 102, 241, 0.25);
            display: flex; justify-content: space-between; align-items: center;
        }
        .welcome-text { font-size: 16px; font-weight: 700; margin: 0; }
        .balance-value { font-size: 13px; font-weight: 700; color: #facc15; }
        .grid { display: flex; flex-direction: column; gap: 14px; }
        .premium-card { 
            background: #161820; padding: 18px; border-radius: 24px; 
            display: flex; justify-content: space-between; align-items: center; 
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .item-title { font-size: 15px; font-weight: 700; margin: 0; }
        .price-tag { color: #ffffff; font-weight: 800; font-size: 16px; display: block; margin-top: 6px; }
        .btn-buy { 
            background: #6366f1; color: white; border: none; 
            font-size: 13px; font-weight: 700; padding: 10px 20px; 
            border-radius: 14px; cursor: pointer;
        }
        .btn-buy:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <!-- Подключаем скрипт Telegram -->
    <script src="https://telegram.org"></script>

    <div class="premium-profile">
        <div>
            <h2 class="welcome-text" id="user-display">Премиум Клиент</h2>
        </div>
        <div class="balance-value">VIP Статус</div>
    </div>

    <div class="grid">
        <!-- Товар 1 -->
        <div class="premium-card">
            <div>
                <h3 class="item-title">Telegram Premium (1 мес)</h3>
                <span class="price-tag">299 ₽</span>
            </div>
            <button class="btn-buy" onclick="sendOrder('Telegram Premium 1 мес', 299)">Купить</button>
        </div>

        <!-- Товар 2 -->
        <div class="premium-card">
            <div>
                <h3 class="item-title">Скоростной VPN (1 год)</h3>
                <span class="price-tag">590 ₽</span>
            </div>
            <button class="btn-buy" onclick="sendOrder('Скоростной VPN 1 год', 590)">Купить</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('user-display').innerText = tg.initDataUnsafe.user.first_name;
        }

        // Простейшая, безотказная функция отправки заказа одной кнопкой
        function sendOrder(name, price) {
            let dataToSend = {
                items: [name],
                total_price: price,
                payment_method: "Не указан"
            };
            tg.sendData(JSON.stringify(dataToSend));
        }
    </script>
</body>
</html>
