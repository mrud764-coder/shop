<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enterprise Marketplace</title>
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #161820;
            --accent: #6366f1;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        body { 
            background-color: var(--bg-color); color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            padding: 16px 16px 100px 16px; margin: 0;
        }

        .brand { font-size: 20px; font-weight: 800; color: var(--accent); text-align: center; margin-bottom: 20px; }
        .grid { display: flex; flex-direction: column; gap: 14px; }
        
        .premium-card { 
            background: var(--card-bg); padding: 18px; border-radius: 24px; 
            display: flex; justify-content: space-between; align-items: center; 
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .item-title { font-size: 15px; font-weight: 700; margin: 0; }
        .price-tag { color: #ffffff; font-weight: 800; font-size: 16px; display: block; margin-top: 6px; }
        
        /* Кнопка купить теперь является прямой ссылкой */
        .btn-link { 
            background: var(--accent); color: white; text-decoration: none;
            font-size: 13px; font-weight: 700; padding: 12px 24px; 
            border-radius: 14px; display: inline-block; text-align: center;
        }
        .btn-link:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="brand">CYBER NEXUS</div>

    <div class="grid">
        <!-- ТОВАР 1 -->
        <div class="premium-card">
            <div>
                <h3 class="item-title">Telegram Premium (1 мес)</h3>
                <span class="price-tag">299 ₽</span>
            </div>
            <!-- Прямая HTML ссылка без JS -->
            <a href="https://t.me" class="btn-link">Купить</a>
        </div>

        <!-- ТОВАР 2 -->
        <div class="premium-card">
            <div>
                <h3 class="item-title">Скоростной VPN (1 год)</h3>
                <span class="price-tag">590 ₽</span>
            </div>
            <!-- Прямая HTML ссылка без JS -->
            <a href="https://t.me" class="btn-link">Купить</a>
        </div>
    </div>

</body>
</html>
