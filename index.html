<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enterprise Marketplace</title>
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #161820;
            --accent: #6366f1;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }
        body { 
            background-color: var(--bg-color); color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            padding: 16px 16px 100px 16px; margin: 0;
        }
        .brand { font-size: 20px; font-weight: 800; color: var(--accent); text-align: center; margin-bottom: 20px; }
        .grid { display: flex; flex-direction: column; gap: 14px; }
        .premium-card { 
            background: var(--card-bg); padding: 18px; border-radius: 24px; 
            display: flex; justify-content: space-between; align-items: center; 
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .item-title { font-size: 15px; font-weight: 700; margin: 0; }
        .price-tag { color: #ffffff; font-weight: 800; font-size: 16px; display: block; margin-top: 6px; }
        .btn-buy { background: var(--accent); color: white; border: none; font-size: 12px; font-weight: 700; padding: 10px 20px; border-radius: 14px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="brand">CYBER NEXUS</div>

    <div class="grid">
        <div class="premium-card">
            <div>
                <h3 class="item-title">Telegram Premium (1 мес)</h3>
                <span class="price-tag">299 ₽</span>
            </div>
            <button class="btn-buy" onclick="sendOrder('Telegram Premium', 299)">Купить</button>
        </div>
        <div class="premium-card">
            <div>
                <h3 class="item-title">Скоростной VPN (1 год)</h3>
                <span class="price-tag">590 ₽</span>
            </div>
            <button class="btn-buy" onclick="sendOrder('Скоростной VPN', 590)">Купить</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function sendOrder(itemName, itemPrice) {
            // ВНИМАНИЕ: Сюда мы вставим IP вашего сервера Vultr
            const SERVER_IP = "ВАШ_IP_АДРЕС_VULTR"; 
            
            // Если открыто в Safari, initData будет пустой, используем тестовый id
            let userId = 123456789; 
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                userId = tg.initDataUnsafe.user.id;
            }

            // Показываем пользователю, что процесс пошел
            alert("Запрос отправлен! Проверьте чат с ботом.");

            // Отправляем прямой POST запрос на бэкенд бота без участия ссылок Telegram
            fetch("http://" + SERVER_IP + ":8000/api/order", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    user_id: userId,
                    title: itemName,
                    price: itemPrice
                })
            }).catch(err => console.log("Сетевая ошибка, но для теста это нормально"));
            
            if(tg.initData) { tg.close(); }
        }
    </script>
</body>
</html>
